<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisan için - Made by Talha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        
        :root {
            --toy-pink-light: #ffb3c6;
            --toy-pink-dark: #ff85a2;
            --toy-white: rgba(255, 255, 255, 0.9);
            --glass-soft: rgba(255, 255, 255, 0.5);
        }

        body { 
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            background-color: #ffc2d1;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255, 255, 255, 0.05) 35px, rgba(255, 255, 255, 0.05) 70px);
            color: #4a1d2e;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.8s ease;
        }

        .bg-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .hidden-screen {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            z-index: 0;
        }

        .soft-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border: 6px solid #ffffff;
            border-radius: 50px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            transition: all 0.5s ease;
        }

        .char-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 3px solid transparent;
            border-radius: 35px;
            transition: all 0.3s ease;
            color: #4a1d2e;
        }

        .char-btn.selected {
            background: #ff85a2;
            color: white !important;
            border-color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .room-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 0.5s ease-in-out;
        }

        /* Akşam Vibe Overlay */
        .night-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(10, 10, 50, 0.45), rgba(5, 5, 30, 0.75));
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
            z-index: 25;
        }
        .night-active { opacity: 1; }

        .footer-credit {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 800;
            font-size: 1.2rem;
            color: #ff5c8d;
            text-shadow: 2px 2px 0px white;
            letter-spacing: 1px;
            z-index: 100;
            transition: color 0.5s ease;
        }

        .soft-btn {
            background: linear-gradient(135deg, #ff85a2, #ff5c8d);
            color: white;
            padding: 18px 50px;
            border-radius: 40px;
            font-weight: 800;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            border: 4px solid white;
        }

        .soft-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.3);
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            animation: rise 1s ease-out forwards;
            box-shadow: 0 0 10px white;
        }
        @keyframes rise {
            to { transform: translateY(-120px) scale(2); opacity: 0; }
        }

        /* Konuşma Balonu */
        .speech-bubble {
            position: absolute;
            background: white;
            padding: 15px 25px;
            border-radius: 25px;
            color: #ff5c8d;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #ffc2d1;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 110;
            display: none;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        @keyframes popIn {
            from { transform: translateX(-50%) scale(0); opacity: 0; }
            to { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .draggable {
            cursor: grab;
            position: absolute;
            z-index: 100;
        }
        .draggable:active { cursor: grabbing; }

        .char-container {
            width: 250px;
            height: 250px;
            transition: transform 0.2s ease, filter 0.8s ease;
            position: relative;
        }

        .dirty-effect {
            filter: sepia(0.5) contrast(0.7) brightness(0.7) drop-shadow(0 0 8px rgba(100, 100, 50, 0.4));
        }

        .item-icon {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid #ffc2d1;
        }

        .sleeping-state {
            filter: brightness(0.25) grayscale(0.4) drop-shadow(0 0 20px rgba(0, 0, 0, 0.9)) !important;
            transform: scale(0.8) rotate(-15deg) !important;
        }

        .hud-bar {
            background: white;
            padding: 10px 15px;
            border-radius: 25px;
            border: 3px solid #ffc2d1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .bed-target {
            position: absolute;
            right: 10%;
            bottom: 10%;
            width: 320px;
            height: 220px;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        .bounce-char { animation: jump 2.5s ease-in-out infinite; }

        .letter-btn {
            margin-top: 15px;
            padding: 12px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid #ffc2d1;
            transition: 0.3s;
        }
        .letter-btn:hover { transform: scale(1.1); }
        
        .secret-code-hint {
            position: absolute;
            top: 20px;
            left: 20px;
            color: black;
            font-weight: 800;
            font-size: 14px;
            z-index: 60;
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>

        kitty: {
            kitchen: "https://img.freepik.com/free-vector/modern-kitchen-interior-background-template-cartoon-dinner-room-with-furniture_33099-131.jpg?semt=ais_hybrid&w=740&q=80",
            bathroom: "https://img.freepik.com/premium-vektor/modern-banyo-ic-mekani_118813-989.jpg",
            bedroom: "https://img.freepik.com/premium-vektor/cizgi-film-yatak-odasi-arka-plan-vektor-tasarimi_1206322-83.jpg?semt=ais_hybrid&w=740&q=80",
            garden: "https://img.freepik.com/premium-vektor/bos-arka-bahce-duz-renk-illustrasyonu-arka-planda-gunesli-gokyuzu-olan-insansiz-konut-binasi-avlusu-2d-cizgi-film-manzarasi-kirsal-kesim-gayrimenkul-banliyo-yasam-tarzi_151150-2631.jpg?w=360",
            school: "https://www.shutterstock.com/shutterstock/videos/1064288065/thumb/2.jpg?ip=x480"
        },
        stitch: {
            kitchen: "https://cdna.artstation.com/p/assets/images/images/041/568/770/large/kristin-smith-smith-kristin-y1-c2-a1-background.jpg?1632078565",
            bathroom: "https://img.freepik.com/premium-vektor/modern-banyo-ic-mekani_118813-989.jpg",
            bedroom: "https://mir-s3-cdn-cf.behance.net/project_modules/hd/e99c2736595091.5721d639647b0.jpg",
            garden: "https://static.vecteezy.com/system/resources/thumbnails/006/853/173/small/middle-of-a-forest-nature-illustration-vector.jpg",
            school: "https://www.shutterstock.com/shutterstock/videos/1064288065/thumb/2.jpg?ip=x480"
        },
        alien: {
            kitchen: "https://media.craiyon.com/2025-09-01/81gxPVV3Su6JnNIWQ7ihdA.webp",
            bathroom: "https://images-rsg.storage.googleapis.com/wp-content/uploads/2016/07/Space-Crisis-2D-Interior-Bathroom.jpg",
            bedroom: "https://img.freepik.com/premium-photo/scifi-bedroom-with-hovering-spaceship-serving-as-nightlight-providing-soft-light-music_124507-122551.jpg?w=360",
            garden: "https://www.awn.com/sites/default/files/styles/large_featured/public/image/featured/1030919-clip-regular-show-blasts-space-out-world-series-finale.jpg?itok=9KrqDtdN",
            school: "https://static.wikia.nocookie.net/theregularshow/images/6/60/S8E06.011_Space_Tree_and_Space_Bush.png/revision/latest?cb=20161013131802"
        }
    };

    const themes = {
        kitty: { bg: "#ffc2d1", heart: "#ff5c8d" },
        stitch: { bg: "#0f172a", heart: "#000000" },
        chick: { bg: "#2d1b33", heart: "#ffb3c6" },
        alien: { bg: "#166534", heart: "#064e3b" }
    };

    let state = {
        selectedChar: 'kitty',
        room: 'kitchen',
        stats: { hunger: 80, hygiene: 100, energy: 70 },
        isSleeping: false,
        atSchool: false,
        schoolTimeLeft: 0,
        lastCleaned: Date.now(),
        isDirty: false,
        letterUnlocked: false
    };

    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
        document.getElementById(id).classList.remove('hidden-screen');
    }

    function updateSelection(char) {
        state.selectedChar = char;
        const theme = themes[char];
        document.body.style.backgroundColor = theme.bg;
        document.getElementById('heart-path').setAttribute('fill', theme.heart);
        document.querySelectorAll('#char-list button').forEach(b => b.classList.remove('selected'));
        document.getElementById('opt-' + char).classList.add('selected');
        document.getElementById('selection-preview').innerHTML = charData[char];
    }

    function openSecretLetter() {
        if(state.letterUnlocked) {
            showMessage("Nisan, seni çok seviyorum! ❤️ - Talha");
        } else {
            document.getElementById('password-modal').classList.remove('hidden');
            document.getElementById('password-modal').classList.add('flex');
        }
    }

    function closeModal() {
        document.getElementById('password-modal').classList.add('hidden');
    }

    function checkLetterCode() {
        const input = document.getElementById('secret-input').value;
        if(input === "nisan<3123") {
            state.letterUnlocked = true;
            document.getElementById('letter-icon').innerText = "💖 ✉️";
            showMessage("Şifre Doğru! Mektup Açıldı.");
            closeModal();
        } else {
            showMessage("Yanlış Şifre! Stitch'in bahçesine bak.");
        }
    }

    function enterWorld() {
        changeScreen('world-screen');
        document.getElementById('char-svg-wrap').innerHTML = charData[state.selectedChar];
        goRoom('kitchen');
        startLoop();
        makeElementDraggable(document.getElementById('char-draggable'), checkCollisions);
    }

    function startLoop() {
        setInterval(() => {
            if (Date.now() - state.lastCleaned > 600000) { state.isDirty = true; }
            if (!state.isSleeping && !state.atSchool) {
                state.stats.hunger = Math.max(0, state.stats.hunger - 0.05);
                state.stats.hygiene = Math.max(0, state.stats.hygiene - 0.03);
                state.stats.energy = Math.max(0, state.stats.energy - 0.02);
                updateUI();
            }
            if (state.atSchool) handleSchoolTimer();

            // Civcik Konuşma Mantığı
            if(state.selectedChar === 'chick' && !state.isSleeping && !state.atSchool) {
                if(Math.random() > 0.95) {
                    showCivcikSpeech();
                }
            }
        }, 1000);
    }

    function showCivcikSpeech() {
        const bubble = document.getElementById('speech-bubble');
        const quote = nisanQuotes[Math.floor(Math.random() * nisanQuotes.length)];
        bubble.innerText = quote;
        bubble.style.display = 'block';
        setTimeout(() => { bubble.style.display = 'none'; }, 4000);
    }

    function updateUI() {
        document.getElementById('bar-hunger').style.width = state.stats.hunger + '%';
        document.getElementById('bar-hygiene').style.width = state.stats.hygiene + '%';
        document.getElementById('bar-energy').style.width = state.stats.energy + '%';
        const char = document.getElementById('char-container');
        const night = document.getElementById('night-vibe');
        
        if (state.isSleeping) {
            char.classList.add('sleeping-state');
            night.classList.add('night-active');
        } else {
            char.classList.remove('sleeping-state');
            night.classList.remove('night-active');
            if (state.isDirty || state.stats.hygiene < 30) char.classList.add('dirty-effect');
            else char.classList.remove('dirty-effect');
        }
    }

    function goRoom(roomName) {
        if (state.atSchool && roomName !== 'school') { showMessage("Okuldan kaçamazsın!"); return; }
        state.room = roomName;
        
        const charConfig = roomConfigs[state.selectedChar] || roomConfigs['kitty'];
        const bgUrl = charConfig[roomName] || roomConfigs['kitty'][roomName];
        document.getElementById('room-bg-layer').style.backgroundImage = `url('${bgUrl}')`;
        
        const layer = document.getElementById('interaction-layer');
        const bed = document.getElementById('bed-target');
        const charWrap = document.getElementById('char-draggable');
        const hint = document.getElementById('secret-hint');
        
        layer.innerHTML = '';
        layer.classList.add('pointer-events-none');
        bed.classList.add('hidden');
        hint.classList.add('hidden');
        
        if(roomName === 'garden' && state.selectedChar === 'stitch') {
            hint.classList.remove('hidden');
        }

        if(roomName === 'school') {
            charWrap.style.left = "45%"; charWrap.style.bottom = "120px"; charWrap.style.top = "auto";
        }

        if (roomName === 'kitchen') {
            layer.classList.remove('pointer-events-none');
            layer.innerHTML = `<div id="food-item" class="draggable item-icon" style="left: 70%; bottom: 30%; top: auto;">${foods[currentFoodIdx]}</div>`;
            makeElementDraggable(document.getElementById('food-item'), checkCollisions);
        }
        if (roomName === 'bathroom') {
            layer.classList.remove('pointer-events-none');
            layer.innerHTML = `<div id="soap-item" class="draggable item-icon" style="left: 70%; bottom: 30%; top: auto;">🧼</div>`;
            makeElementDraggable(document.getElementById('soap-item'), checkCollisions);
        }
        if (roomName === 'bedroom') { bed.classList.remove('hidden'); }
        
        if (roomName === 'garden') {
            layer.classList.remove('pointer-events-none');
            const gardenText = (state.selectedChar === 'alien') ? 'Mordecai ve Rigby ile eğlen!' : 'KOŞTUR! 🏃‍♂️';
            const gardenAction = (state.selectedChar === 'alien') ? 'funWithRegularShow()' : 'runInGarden()';
            layer.innerHTML = `<div class="absolute left-1/2 bottom-10 -translate-x-1/2"><button onclick="${gardenAction}" class="soft-btn text-lg bg-green-500 border-green-200 shadow-md">${gardenText}</button></div>`;
        }
        
        if (roomName === 'school' && !state.atSchool) {
            layer.classList.remove('pointer-events-none');
            layer.innerHTML = `<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 soft-panel p-10 text-center"><button onclick="startSchool()" class="soft-btn">DERSE GİR</button></div>`;
        }
        updateUI();
    }

    function makeElementDraggable(el, onDrag) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        el.onmousedown = dragMouseDown;
        el.ontouchstart = dragMouseDown;
        function dragMouseDown(e) {
            if(state.atSchool && el.id === 'char-draggable') return;
            e = e || window.event;
            pos3 = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            pos4 = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            document.onmouseup = closeDragElement;
            document.ontouchend = closeDragElement;
            document.onmousemove = elementDrag;
            document.ontouchmove = elementDrag;
        }
        function elementDrag(e) {
            e = e || window.event;
            let cx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let cy = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            pos1 = pos3 - cx; pos2 = pos4 - cy; pos3 = cx; pos4 = cy;
            el.style.top = (el.offsetTop - pos2) + "px";
            el.style.left = (el.offsetLeft - pos1) + "px";
            if (onDrag) onDrag(el);
        }
        function closeDragElement() {
            document.onmouseup = null; document.onmousemove = null;
            document.ontouchend = null; document.ontouchmove = null;
        }
    }

    function checkCollisions(draggedEl) {
        const char = document.getElementById('char-draggable');
        const rect1 = draggedEl.getBoundingClientRect();
        const rectChar = char.getBoundingClientRect();
        const isOverChar = !(rect1.right < rectChar.left || rect1.left > rectChar.right || rect1.bottom < rectChar.top || rect1.top > rectChar.bottom);

        if (draggedEl.id === 'food-item' && isOverChar) {
            if (state.stats.hunger < 100) {
                state.stats.hunger = Math.min(100, state.stats.hunger + 3);
                updateUI();
                if(state.stats.hunger > 99 || Math.random() > 0.94) {
                    currentFoodIdx = (currentFoodIdx + 1) % foods.length;
                    draggedEl.innerText = foods[currentFoodIdx];
                    draggedEl.style.left = "70%"; draggedEl.style.bottom = "30%"; draggedEl.style.top = "auto";
                    showMessage("Mmm, harika! 😋");
                }
            }
        }
        if (draggedEl.id === 'soap-item' && isOverChar) {
            if (state.stats.hygiene < 100 || state.isDirty) {
                state.stats.hygiene = Math.min(100, state.stats.hygiene + 2.5);
                state.isDirty = false; state.lastCleaned = Date.now();
                updateUI(); createBubble(rect1.left + 50, rect1.top + 50);
            }
        }
        if (draggedEl.id === 'char-draggable' && state.room === 'bedroom') {
            const bed = document.getElementById('bed-target').getBoundingClientRect();
            const isOverBed = !(rectChar.right < bed.left || rectChar.left > bed.right || rectChar.bottom < bed.top || rectChar.top > bed.bottom);
            if (isOverBed && !state.isSleeping) {
                state.isSleeping = true; state.stats.energy = 100; updateUI(); showMessage("Tatlı rüyalar... 💤");
            } else if (!isOverBed && state.isSleeping) {
                state.isSleeping = false; updateUI(); showMessage("Yeni bir gün! ☀️");
            }
        }
    }

    function runInGarden() {
        const char = document.getElementById('char-draggable');
        char.style.transition = "all 0.5s ease-in-out";
        let count = 0;
        let runInterval = setInterval(() => {
            char.style.left = (30 + Math.random() * 40) + "%";
            char.style.bottom = (100 + Math.random() * 50) + "px";
            count++;
            if(count > 8) {
                clearInterval(runInterval); char.style.transition = "none";
                state.stats.energy = Math.max(0, state.stats.energy - 20);
                state.stats.hunger = Math.max(0, state.stats.hunger - 15);
                state.stats.hygiene = Math.max(0, state.stats.hygiene - 25);
                state.isDirty = true; updateUI(); showMessage("Çok yoruldum! 🥵");
            }
        }, 300);
    }

    function funWithRegularShow() {
        const mainArea = document.getElementById('main-area');
        mainArea.classList.add('shaking');
        showMessage("UZAYDA EĞLENCE BAŞLIYOR! 🚀");
        setTimeout(() => {
            mainArea.classList.remove('shaking');
            state.isDirty = true;
            state.stats.hunger = Math.max(0, state.stats.hunger - 25);
            state.stats.energy = Math.max(0, state.stats.energy - 10);
            updateUI();
            showMessage("Heryer toz oldu ve acıktım! 🌌");
        }, 1500);
    }

    function createBubble(x, y) {
        const b = document.createElement('div');
        b.className = 'bubble'; b.style.left = x + 'px'; b.style.top = y + 'px';
        b.style.width = b.style.height = (25 + Math.random() * 25) + 'px';
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 1000);
    }

    function startSchool() {
        state.atSchool = true; state.schoolTimeLeft = 10;
        document.getElementById('school-info').classList.remove('hidden');
        goRoom('school');
    }

    function handleSchoolTimer() {
        if (state.schoolTimeLeft > 0) {
            state.schoolTimeLeft--;
            const h = Math.floor(state.schoolTimeLeft / 3600);
            const m = Math.floor((state.schoolTimeLeft % 3600) / 60);
            const s = state.schoolTimeLeft % 60;
            document.getElementById('school-timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        } else {
            state.atSchool = false; state.stats.hunger = 15;
            document.getElementById('school-info').classList.add('hidden');
            updateUI(); goRoom('school'); showQuiz();
        }
    }

    function showQuiz() {
        const questions = [
            { q: "Dünyanın en soğuk yeri neresidir?", a: ["Kuzey Kutbu", "Antarktika", "Sibirya"], c: 1 },
            { q: "Güneş sistemindeki en büyük gezegen?", a: ["Mars", "Dünya", "Jüpiter"], c: 2 }
        ];
        const q = questions[Math.floor(Math.random() * questions.length)];
        const overlay = document.getElementById('quiz-overlay');
        document.getElementById('question-text').innerText = q.q;
        const grid = document.getElementById('answers-grid');
        grid.innerHTML = '';
        q.a.forEach((ans, i) => {
            const b = document.createElement('button');
            b.className = "soft-btn bg-white !text-[#ff5c8d]";
            b.innerText = ans;
            b.onclick = () => {
                if(i === q.c) { showMessage("Dahisin!"); overlay.classList.add('hidden'); }
                else showMessage("Maalesef yanlış!");
            };
            grid.appendChild(b);
        });
        overlay.classList.remove('hidden'); overlay.classList.add('flex');
    }

    function showMessage(txt) {
        const m = document.createElement('div');
        m.className = "fixed top-32 left-1/2 -translate-x-1/2 bg-white text-[#ff5c8d] px-10 py-4 rounded-full font-black shadow-2xl z-[300] animate-bounce border-4 border-[#ffc2d1]";
        m.innerText = txt;
        document.body.appendChild(m);
        setTimeout(() => m.remove(), 2500);
    }

    window.onload = () => updateSelection('kitty');
</script>
