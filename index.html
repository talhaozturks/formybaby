<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nisan için - Made by Talha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        
        :root {
            --bg-main: #ffc2d1;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --text-color: #4a1d2e;
            --border-color: #ffc2d1;
            --hud-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        .dark-mode {
            --bg-main: #1a1a2e;
            --panel-bg: rgba(30, 30, 50, 0.98);
            --text-color: #fce7f3;
            --border-color: #4a1d2e;
            --hud-bg: #16213e;
            --nav-bg: #16213e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            margin: 0; font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-main); color: var(--text-color);
            height: 100vh; width: 100vw; overflow: hidden;
            user-select: none; touch-action: none; transition: background-color 0.6s ease, color 0.3s ease;
        }

        .bg-hearts {
            position: fixed; inset: 0; pointer-events: none; z-index: 1;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M50 30 C50 15 15 15 15 40 C15 65 50 85 50 85 C50 85 85 65 85 40 C85 15 50 15 50 30" fill="%23ff5c8d" opacity="0.2"/></svg>');
            background-size: 100px 100px; animation: moveHearts 25s linear infinite;
        }
        @keyframes moveHearts { from { background-position: 0 0; } to { background-position: 500px 0; } }

        #initial-loading {
            position: fixed; inset: 0; background: #ffc2d1; z-index: 9000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-bar-container { width: 250px; height: 12px; background: rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; margin-top: 15px; border: 2px solid white; }
        #loading-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #ff85a2, #ff5c8d); transition: width 0.3s; }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: all 0.5s ease; z-index: 10; background-color: transparent; }
        .hidden-screen { opacity: 0; pointer-events: none; transform: scale(0.98); }

        .soft-panel { background: var(--panel-bg); border: 3px solid #ffffff; border-radius: 25px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1); color: var(--text-color); }

        .hud-bar { background: var(--hud-bg); padding: 4px 8px; border-radius: 12px; border: 2px solid var(--border-color); display: flex; flex-direction: column; align-items: center; min-width: 60px; transition: 0.3s; }
        .hud-text { font-size: 7px; font-weight: 900; text-transform: uppercase; color: var(--text-color); margin-bottom: 2px; }

        .draggable { cursor: grab; position: absolute; z-index: 100; touch-action: none; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .is-dragging { cursor: grabbing; z-index: 1000 !important; transform: scale(1.1); }
        
        .char-container { width: 140px; height: 140px; position: relative; z-index: 50; }
        @media (min-width: 768px) { .char-container { width: 170px; height: 170px; } }

        .night-overlay { position: absolute; inset: 0; background: rgba(0, 0, 30, 0.7); pointer-events: none; opacity: 0; transition: opacity 1s; z-index: 200; }

        .top-btn { position: fixed; z-index: 500; background: var(--hud-bg); border: 2px solid var(--border-color); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: var(--text-color); transition: 0.3s; }
        .dark-toggle { bottom: 110px; right: 20px; }

        .soft-btn { background: linear-gradient(135deg, #ff85a2, #ff5c8d); color: white !important; border: 3px solid white; border-radius: 30px; font-weight: 800; padding: 10px 20px; box-shadow: 0 6px 15px rgba(255, 92, 141, 0.2); transition: 0.3s; display: inline-block; text-align: center; cursor: pointer; }
        
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: var(--text-color); transition: 0.3s; background: transparent; border: none; cursor: pointer; font-weight: 900; font-size: 10px; text-transform: uppercase; border-radius: 15px; margin: 2px; height: 85%; }
        .nav-btn-active { background: #f97316 !important; color: white !important; transform: scale(1.05); }

        .speech-bubble {
            position: absolute; background: white; padding: 8px 12px; border-radius: 20px; color: #ff5c8d; font-weight: 800;
            font-size: 11px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 3px solid #ffc2d1; bottom: 115%; left: 50%;
            transform: translateX(-50%); width: max-content; max-width: 150px; z-index: 110; display: block; text-align: center; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }

        .sleep-zzz {
            position: absolute; top: -30px; right: 10px; font-size: 26px; font-weight: 900; color: #3b82f6; 
            display: none; pointer-events: none; z-index: 120;
            animation: floatZzz 2s infinite ease-in-out;
        }
        @keyframes floatZzz {
            0% { transform: translate(0, 0) scale(0.7); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(10px, -40px) scale(1.1); opacity: 0; }
        }

        .dust-overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.5s; background-image: radial-gradient(#8b5a2b 1.5px, transparent 1px); background-size: 10px 10px; border-radius: 50%; z-index: 60; }
        .is-dirty .dust-overlay { opacity: 0.8; }

        .char-head { 
            transform-origin: center 130px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .limb { transform-box: fill-box; transition: transform 0.2s; }
        .is-dragging .limb-arm-l { animation: limbSwing 0.3s infinite alternate; transform-origin: center top; }
        .is-dragging .limb-arm-r { animation: limbSwing 0.3s infinite alternate-reverse; transform-origin: center top; }
        .is-dragging .limb-leg-l { animation: limbSwing 0.4s infinite alternate; transform-origin: center top; }
        .is-dragging .limb-leg-r { animation: limbSwing 0.4s infinite alternate-reverse; transform-origin: center top; }
        @keyframes limbSwing { from { transform: rotate(-15deg); } to { transform: rotate(15deg); } }

        .item-icon { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 3px solid #ffc2d1; box-shadow: 0 5px 15px rgba(0,0,0,0.1); pointer-events: auto; }
        
        .char-btn { background: rgba(255, 255, 255, 0.6); border: 2px solid transparent; border-radius: 20px; padding: 10px; transition: 0.3s; text-align: left; display: flex; align-items: center; gap: 10px; width: 100%; color: #4a1d2e; cursor: pointer; }
        .dark-mode .char-btn { background: rgba(255, 255, 255, 0.05); color: #fce7f3; }
        .char-btn-kitty.selected { background: #ff85a2 !important; color: white !important; }
        .char-btn-stitch.selected { background: #1e3a8a !important; color: white !important; }
        .char-btn-chick.selected { background: #ffc2d1 !important; color: #4a1d2e !important; border-color: #ff85a2 !important; }
        .char-btn-alien.selected { background: #166534 !important; color: white !important; }

        .bed-area { position: absolute; right: 0; top: 0; bottom: 0; width: 35%; background: rgba(255,255,255,0.01); z-index: 5; pointer-events: none; }
        
        .poster-frame { position: absolute; width: 70px; height: 95px; background: #fff; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transform: rotate(1deg); z-index: 5; overflow: hidden; }
        .poster-frame img { width: 100%; height: 100%; object-fit: cover; }

        .lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 10px; z-index: 20; }
        
        .modal-body { max-height: 55vh; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
        .grid-flex { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .shop-box { width: 130px; background: var(--panel-bg); border: 2px solid var(--border-color); border-radius: 15px; padding: 10px; text-align: center; position: relative; color: var(--text-color); }

        .shop-tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 5px; overflow-x: auto; }
        .shop-tab { padding: 6px 12px; font-size: 10px; font-weight: 800; border-radius: 10px; background: rgba(0,0,0,0.05); cursor: pointer; white-space: nowrap; }
        .shop-tab.active { background: #ff5c8d; color: white; }

        .login-input { width: 100%; padding: 14px; border: 3px solid #ffc2d1; border-radius: 18px; margin-bottom: 12px; text-align: center; font-weight: 800; font-size: 16px; outline: none; background: var(--hud-bg); color: var(--text-color); }
        @keyframes somersault { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .is-somersaulting { animation: somersault 0.6s ease-in-out; }
    </style>
</head>
<body id="main-body">

<div id="initial-loading">
    <h2 class="text-xl font-extrabold text-[#ff5c8d] mb-2 text-center px-4">Talha tarafından ❤️ ile hazırlandı.</h2>
    <p id="loading-text" class="text-xs font-bold uppercase opacity-70 text-pink-600">sistemler kontrol ediliyor...</p>
    <div class="loading-bar-container">
        <div id="loading-progress"></div>
    </div>
</div>

<div class="bg-hearts"></div>
<div class="top-btn dark-toggle" id="mode-btn" onclick="window.toggleDarkMode()">🌓</div>

<!-- LOGIN -->
<div id="login-screen" class="screen items-center justify-center p-4 hidden-screen">
    <div class="soft-panel p-8 w-full max-w-sm text-center">
        <h2 class="text-2xl font-black text-[#ff5c8d] mb-6 uppercase">Hoş Geldin Nisan</h2>
        <input type="text" id="login-username" class="login-input" placeholder="Kullanıcı Adı">
        <input type="password" id="login-password" class="login-input" placeholder="Şifre">
        <button onclick="window.handleLogin()" class="soft-btn w-full py-4 text-sm uppercase mb-4 shadow-lg">HESABA GİR</button>
        <button onclick="window.handleGuestLogin()" class="text-[10px] font-black uppercase text-gray-400 border-b border-gray-200">Misafir Olarak Gir (Kaydedilmez!)</button>
    </div>
</div>

<!-- WELCOME -->
<div id="welcome-screen" class="screen items-center justify-center p-4 hidden-screen">
    <div class="pinned-note" style="position: absolute; top: 20px; left: 20px; width: 90px; height: 90px; background: #fff9c4; transform: rotate(-3deg); box-shadow: 3px 3px 10px rgba(0,0,0,0.1); border-radius: 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 120;">
        <p style="font-weight: 800; color: #d84315; font-size: 10px; margin: 0;">Birlikte</p>
        <p id="day-counter" style="font-size: 20px; font-weight: 800; color: #d84315; margin: 0;">0</p>
        <p style="font-weight: 800; color: #d84315; font-size: 10px; margin: 0;">gün...</p>
    </div>
    <div class="text-center p-12 soft-panel w-full max-w-xl relative">
        <h1 class="text-4xl md:text-5xl font-extrabold text-[#ff5c8d] uppercase tracking-tighter mb-4">Nisan'ın Dünyası</h1>
        <p class="text-[#a64d79] text-base mb-12 tracking-[0.2em] font-bold uppercase opacity-80">Our Small World</p>
        <button onclick="window.changeScreen('selection-screen')" class="soft-btn text-lg uppercase tracking-widest px-12 py-4">BAŞLA</button>
    </div>
</div>

<!-- SELECTION -->
<div id="selection-screen" class="screen hidden-screen p-4 md:p-10">
    <div class="flex flex-col lg:flex-row h-full items-center justify-center gap-8 max-w-6xl mx-auto w-full overflow-y-auto">
        <div class="soft-panel w-full max-w-sm p-6 z-20">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h2 class="text-xl font-black text-[#ff5c8d] uppercase">Arkadaş Seç</h2>
                    <p class="text-[10px] font-black text-red-400 mt-1">🍒 Vişnen: <span id="cherry-count-selection">0</span></p>
                </div>
                <button onclick="window.openShop()" class="bg-[#ef4444] text-white px-3 py-1.5 rounded-xl text-[9px] font-black uppercase shadow-lg">Mağaza</button>
            </div>
            <div class="flex flex-col gap-3" id="char-list">
                <button onclick="window.updateSelection('kitty')" id="opt-kitty" class="char-btn char-btn-kitty selected">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-xl shadow-sm">🎀</div>
                    <div><h3 class="font-bold text-sm text-inherit">Hello Kitty</h3><p class="text-[8px] uppercase opacity-70">En Tatlı</p></div>
                </button>
                <button onclick="window.updateSelection('stitch')" id="opt-stitch" class="char-btn char-btn-stitch">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-xl shadow-sm">🌀</div>
                    <div><h3 class="font-bold text-sm text-inherit">Stitch</h3><p class="text-[8px] uppercase opacity-70">Haylaz</p></div>
                </button>
                <button onclick="window.updateSelection('chick')" id="opt-chick" class="char-btn char-btn-chick relative overflow-hidden">
                    <div id="chick-lock-ui" class="lock-overlay"><span>🍒 50</span></div>
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-xl shadow-sm">🐣</div>
                    <div><h3 class="font-bold text-sm text-inherit">Civcik</h3><p class="text-[8px] uppercase opacity-70">Minik</p></div>
                </button>
                <button onclick="window.updateSelection('alien')" id="opt-alien" class="char-btn char-btn-alien">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-xl shadow-sm">👽</div>
                    <div><h3 class="font-bold text-sm text-inherit">Prospectus</h3><p class="text-[8px] uppercase opacity-70">Uzaylı</p></div>
                </button>
            </div>
            <button onclick="window.enterWorld()" class="w-full mt-6 soft-btn py-4">DÜNYAYA GİT</button>
        </div>
        <div id="selection-preview" class="w-full max-w-[200px] aspect-square flex items-center justify-center"></div>
    </div>
</div>

<!-- WORLD -->
<div id="world-screen" class="screen hidden-screen">
    <div class="night-overlay" id="night-overlay"></div>
    <!-- HUD -->
    <div class="h-20 w-full flex items-center justify-between px-3 bg-white/95 backdrop-blur-md border-b-2 z-50 overflow-x-auto gap-4" style="background: var(--nav-bg); border-color: var(--border-color);">
        <div class="flex gap-2 flex-shrink-0">
            <div class="hud-bar"><span class="hud-text">Açlık</span><div class="w-10 h-2 bg-gray-100 rounded-full overflow-hidden"><div id="bar-hunger" class="h-full bg-pink-400" style="width: 80%"></div></div></div>
            <div class="hud-bar"><span class="hud-text">Hijyen</span><div class="w-10 h-2 bg-gray-100 rounded-full overflow-hidden"><div id="bar-hygiene" class="h-full bg-blue-400" style="width: 100%"></div></div></div>
            <div class="hud-bar"><span class="hud-text">Uyku</span><div class="w-10 h-2 bg-gray-100 rounded-full overflow-hidden"><div id="bar-energy" class="h-full bg-yellow-400" style="width: 100%"></div></div></div>
            <div class="flex items-center gap-1 px-3 bg-white border-2 border-red-200 rounded-xl font-black text-red-500 text-sm shadow-sm">🍒 <span id="cherry-count-hud">0</span></div>
        </div>
        <button onclick="window.changeScreen('selection-screen')" class="bg-white/90 px-3 py-1.5 rounded-xl border border-pink-100 text-[8px] font-black uppercase text-pink-500 flex-shrink-0">Değiştir</button>
    </div>

    <div id="main-area" class="flex-1 relative overflow-hidden">
        <div id="room-bg-layer" class="absolute inset-0 bg-cover bg-center transition-all duration-700"></div>
        <div id="bed-area-trigger" class="bed-area"></div>
        
        <div id="closet-target" class="hidden absolute left-4 bottom-[22%] z-[350] flex flex-col items-center justify-center w-16 h-36 bg-white/30 backdrop-blur-md border-2 border-dashed border-white rounded-2xl cursor-pointer" onclick="window.openCloset()">
            <span class="text-2xl">👗</span><p class="text-[8px] font-black uppercase text-white mt-1">Dolap</p>
        </div>
        
        <div id="char-draggable" class="draggable" style="left: 40%; bottom: 100px;">
            <div id="char-container" class="char-container">
                <div id="zzz-emoji" class="sleep-zzz">zZz</div>
                <div class="dust-overlay"></div>
                <div id="char-svg-wrap"></div>
                <div id="speech-bubble" class="speech-bubble">Merhaba!</div>
            </div>
        </div>
        <div id="interaction-layer" class="absolute inset-0 z-[150] pointer-events-none"></div>
    </div>

    <!-- ALT NAVBAR -->
    <div id="navbar" class="h-24 w-full backdrop-blur-md border-t-2 flex items-center justify-around z-[400] shadow-lg px-1 pb-safe" style="background: var(--nav-bg); border-top-color: var(--border-color);">
        <button id="nav-kitchen" onclick="window.goRoom('kitchen')" class="nav-btn"><span>🧁</span><span class="text-[9px]">Mutfak</span></button>
        <button id="nav-bathroom" onclick="window.goRoom('bathroom')" class="nav-btn"><span>🧼</span><span class="text-[9px]">Banyo</span></button>
        <button id="nav-bedroom" onclick="window.goRoom('bedroom')" class="nav-btn"><span>🛌</span><span class="text-[9px]">Uyku</span></button>
        <button id="nav-garden" onclick="window.goRoom('garden')" class="nav-btn"><span>🌲</span><span class="text-[9px]">Bahçe</span></button>
        <button id="nav-school" onclick="window.goRoom('school')" class="nav-btn"><span>🎓</span><span class="text-[9px]">Okul</span></button>
    </div>
</div>

<!-- MODALLAR -->
<div id="shop-modal" class="fixed inset-0 bg-black/85 z-[600] hidden items-center justify-center p-2">
    <div class="soft-panel p-6 max-w-lg w-full border-4 border-red-300 flex flex-col">
        <div class="flex justify-between items-center mb-2">
            <h3 class="text-xl font-black text-red-500 uppercase">🍒 VişneMağaza</h3>
            <button onclick="window.closeShop()" class="bg-red-500 text-white w-8 h-8 rounded-full font-black">X</button>
        </div>
        <div class="shop-tabs" id="shop-tabs">
            <div class="shop-tab active" onclick="window.openShop('all')">Hepsi</div>
            <div class="shop-tab" onclick="window.openShop('hat')">Şapka</div>
            <div class="shop-tab" onclick="window.openShop('shirt')">Tişört</div>
            <div class="shop-tab" onclick="window.openShop('skirt')">Etek</div>
        </div>
        <div id="shop-items-container" class="modal-body grid-flex"></div>
    </div>
</div>

<div id="closet-modal" class="fixed inset-0 bg-black/75 z-[600] hidden items-center justify-center p-2">
    <div class="soft-panel p-6 max-w-sm w-full flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-black text-pink-500 uppercase">Gardırop</h3>
            <button onclick="window.closeCloset()" class="bg-pink-500 text-white w-8 h-8 rounded-full font-black">X</button>
        </div>
        <div id="closet-items" class="modal-body grid-flex"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let fbConfig = {};
    try { fbConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}'); } catch (e) {}
    
    const app = Object.keys(fbConfig).length > 0 ? initializeApp(fbConfig) : null;
    const auth = app ? getAuth(app) : null;
    const db = app ? getFirestore(app) : null;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'nisan-dunyam';

    let user = null;
    let isGuest = true;
    let currentUserId = "anonymous";

    window.showMessage = (txt) => {
        const m = document.createElement('div');
        m.className = "fixed top-24 left-1/2 -translate-x-1/2 bg-white text-pink-500 px-6 py-3 rounded-full font-black shadow-2xl z-[9000] border-2 border-pink-100 text-xs text-center animate-bounce";
        m.innerText = txt; document.body.appendChild(m);
        setTimeout(() => m.remove(), 2500);
    };

    window.calculateDays = () => Math.floor((new Date() - new Date("2026-02-02")) / 86400000);

    window.state = {
        selectedChar: 'kitty', room: 'kitchen', stats: { hunger: 80, energy: 70, hygiene: 100 },
        isSleeping: false, outfit: 'default', cherries: 0, 
        isDarkMode: false, inventory: [], lastSpeech: 0,
        huntActive: false, huntTimer: 0,
        schoolActive: false, schoolTimer: 0
    };

    const themes = { kitty: "#ffc2d1", stitch: "#1e3a8a", alien: "#166534", chick: "#ffc2d1" };
    const roomConfigs = {
        kitty: { kitchen: "https://img.freepik.com/free-vector/modern-kitchen-interior-background-template-cartoon-dinner-room-with-furniture_33099-131.jpg", bathroom: "https://img.freepik.com/premium-vektor/modern-banyo-ic-mekani_118813-989.jpg", bedroom: "https://img.freepik.com/premium-vektor/cizgi-film-yatak-odasi-arka-plan-vektor-tasarimi_1206322-83.jpg", garden: "https://img.freepik.com/premium-vektor/bos-arka-bahce-duz-renk-illustrasyonu-arka-planda-gunesli-gokyuzu-olan-insansiz-konut-binasi-avlusu_151150-2631.jpg", school: "https://www.shutterstock.com/shutterstock/videos/1064288065/thumb/2.jpg" },

    function makeElementDraggable(el, onDrag) {
        if(!el) return;
        let startX, startY; let lastPosX = 0;
        const dragStart = (e) => {
            const ev = e.touches ? e.touches[0] : e;
            const rect = el.getBoundingClientRect();
            startX = ev.clientX - rect.left; startY = ev.clientY - rect.top;
            lastPosX = ev.clientX; el.classList.add('is-dragging');
            const moveEvent = e.touches ? 'touchmove' : 'mousemove';
            const endEvent = e.touches ? 'touchend' : 'mouseup';
            const dragging = (me) => {
                if (me.cancelable) me.preventDefault();
                const mev = me.touches ? me.touches[0] : me;
                let nx = mev.clientX - startX; let ny = mev.clientY - startY;
                const head = el.querySelector('.char-head'); if (head) { if (mev.clientX > lastPosX + 2) head.style.transform = 'rotate(-8deg)'; else if (mev.clientX < lastPosX - 2) head.style.transform = 'rotate(8deg)'; }
                lastPosX = mev.clientX; el.style.left = nx + 'px'; el.style.top = ny + 'px'; if(onDrag) onDrag(el);
            };
            const dragEnd = () => { el.classList.remove('is-dragging'); const head = el.querySelector('.char-head'); if (head) head.style.transform = 'rotate(0deg)'; document.removeEventListener(moveEvent, dragging); document.removeEventListener(endEvent, dragEnd); if(el.id === 'food-item' || el.id === 'soap-item') { el.style.left = "65%"; el.style.top = "60%"; } };
            document.addEventListener(moveEvent, dragging, { passive: false }); document.addEventListener(endEvent, dragEnd);
        };
        el.addEventListener('mousedown', dragStart); el.addEventListener('touchstart', dragStart, { passive: false });
    }

    function checkCollisions(el) {
        const char = document.getElementById('char-draggable'); const r1=el.getBoundingClientRect(), rc=char.getBoundingClientRect();
        const margin = 10; const over = !(r1.right + margin < rc.left || r1.left - margin > rc.right || r1.bottom + margin < rc.top || r1.top - margin > rc.bottom);
        if(over) {
            if(el.id==='food-item') { state.stats.hunger = Math.min(100, state.stats.hunger+20); currentFoodIdx++; window.goRoom('kitchen'); showMessage("😋 Ham Hum!"); window.saveProgress(); }
            if(el.id==='soap-item') { state.stats.hygiene = Math.min(100, state.stats.hygiene+15); window.updateUI(); window.saveProgress(); }
        }
    }

    window.onload = () => {
        const dc = document.getElementById('day-counter'); if(dc) dc.innerText = window.calculateDays();
        let prg = 0;
        const interval = setInterval(() => { prg += 1.5; document.getElementById('loading-progress').style.width = Math.min(100, prg) + "%"; if(prg >= 100) { clearInterval(interval); document.getElementById('initial-loading').style.display = 'none'; window.changeScreen('login-screen'); } }, 30);
    };
</script>
</body>
</html>
