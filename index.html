<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hızlı 3D Karakter Galerisi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r158/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        
        body { margin: 0; overflow: hidden; font-family: 'Outfit', sans-serif; background: #020617; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Modern Glass UI */
        .ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; align-items: center; justify-content: flex-start;
            padding-left: 5%;
        }

        .selection-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 2rem;
            pointer-events: auto;
            width: 340px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 15px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
        }

        .selection-panel.active { opacity: 1; transform: scale(1); }

        .char-option {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 12px;
        }

        .char-option.selected {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);
        }

        .avatar-box {
            width: 45px; height: 45px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            background: rgba(255,255,255,0.05);
        }

        #loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-weight: bold; letter-spacing: 3px; color: #38bdf8; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="loader">BAŞLATILIYOR...</div>

<div class="ui-container">
    <div class="selection-panel" id="ui-panel">
        <div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400 uppercase">Avatar Seç</h1>
            <p class="text-gray-400 text-xs">2026 Ultra-Hızlı Render</p>
        </div>

        <div class="flex flex-col gap-3">
            <div class="char-option selected" onclick="updateView('kitty', this)">
                <div class="avatar-box">🎀</div>
                <div>
                    <div class="font-bold text-sm">Hello Kitty</div>
                    <div class="text-[10px] text-gray-500 font-bold uppercase">Pürüzsüz Beyaz</div>
                </div>
            </div>

            <div class="char-option" onclick="updateView('stitch', this)">
                <div class="avatar-box">🌀</div>
                <div>
                    <div class="font-bold text-sm">Stitch</div>
                    <div class="text-[10px] text-gray-500 font-bold uppercase">Mavi Galaktik</div>
                </div>
            </div>

            <div class="char-option" onclick="updateView('chick', this)">
                <div class="avatar-box">🐥</div>
                <div>
                    <div class="font-bold text-sm">Pembe Civciv</div>
                    <div class="text-[10px] text-gray-500 font-bold uppercase">Pofuduk Pembe</div>
                </div>
            </div>

            <div class="char-option" onclick="updateView('alien', this)">
                <div class="avatar-box">👽</div>
                <div>
                    <div class="font-bold text-sm">Uzaylı</div>
                    <div class="text-[10px] text-gray-500 font-bold uppercase">Küçük Dost</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, currentModel;
    let isPressed = false;
    let lastX = 0, rotY = 0, rotX = 0;

    const stats = {
        kitty: { main: 0xffffff, accent: 0xef4444, dress: 0x3b82f6 },
        stitch: { main: 0x2563eb, accent: 0x1e40af, detail: 0x93c5fd },
        chick: { main: 0xf472b6, accent: 0xf97316 },
        alien: { main: 0x4ade80, accent: 0x2563eb }
    };

    function init() {
        if (!window.THREE) return;
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('ui-panel').classList.add('active');

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1, 7);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Aydınlatma - Doku derinliği için Rim Light eklendi
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const rimLight = new THREE.PointLight(0x38bdf8, 1);
        rimLight.position.set(-5, 2, -5);
        scene.add(rimLight);

        loadCharacter('kitty');

        // Mouse & Touch
        const start = (x) => { isPressed = true; lastX = x; };
        const move = (x) => { if(isPressed) { rotY += (x - lastX) * 0.01; lastX = x; } };
        
        window.onmousedown = e => start(e.clientX);
        window.onmousemove = e => move(e.clientX);
        window.onmouseup = () => isPressed = false;
        
        window.ontouchstart = e => start(e.touches[0].clientX);
        window.ontouchmove = e => move(e.touches[0].clientX);
        window.ontouchend = () => isPressed = false;

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        animate();
    }

    function loadCharacter(type) {
        if(currentModel) scene.remove(currentModel);
        currentModel = new THREE.Group();
        const c = stats[type];
        
        // Yüksek kalite doku hissi veren materyal
        const mat = new THREE.MeshStandardMaterial({ 
            color: c.main, 
            roughness: 0.1, // Pürüzsüz doku
            metalness: 0.2
        });

        if(type === 'kitty') {
            const head = new THREE.Mesh(new THREE.SphereGeometry(1, 24, 18), mat);
            head.scale.set(1.3, 0.95, 1.1); head.position.y = 1.3;
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.7, 1, 4, 16), new THREE.MeshStandardMaterial({color: c.dress, roughness: 0.2}));
            body.position.y = -0.1;
            const bow = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.08, 8, 16), new THREE.MeshStandardMaterial({color: c.accent}));
            bow.position.set(0.7, 1.8, 0.5);
            currentModel.add(head, body, bow);
            // Whisker
            for(let i=-1; i<=1; i+=2) {
                for(let j=0; j<2; j++) {
                    const w = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.03, 0.03), new THREE.MeshStandardMaterial({color: 0}));
                    w.position.set(1.1 * i, 1.3 + (j*0.15), 0.6); currentModel.add(w);
                }
            }
        } else if(type === 'stitch') {
            const head = new THREE.Mesh(new THREE.SphereGeometry(1.1, 24, 18), mat);
            head.position.y = 1.1;
            const earL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 2, 0.4), new THREE.MeshStandardMaterial({color: c.accent}));
            earL.position.set(-1.3, 1.8, 0); earL.rotation.z = 1;
            const earR = earL.clone(); earR.position.x = 1.3; earR.rotation.z = -1;
            const eye = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({color: 0}));
            eye.position.set(-0.5, 1.2, 0.9);
            const eyeR = eye.clone(); eyeR.position.x = 0.5;
            currentModel.add(head, earL, earR, eye, eyeR);
        } else if(type === 'chick') {
            const body = new THREE.Mesh(new THREE.SphereGeometry(1.4, 24, 18), mat);
            const beak = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.6, 4), new THREE.MeshStandardMaterial({color: c.accent}));
            beak.rotation.x = Math.PI/2; beak.position.set(0, 0.3, 1.3);
            currentModel.add(body, beak);
        } else if(type === 'alien') {
            const head = new THREE.Mesh(new THREE.SphereGeometry(1, 24, 18), mat);
            head.scale.x = 1.6; head.position.y = 1.2;
            const suit = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 1.4), new THREE.MeshStandardMaterial({color: c.accent}));
            suit.position.y = -0.3;
            currentModel.add(head, suit);
            for(let i=-1; i<=1; i++) {
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({color: 0xffffff}));
                eye.position.set(i*0.6, 1.4, 0.8);
                currentModel.add(eye);
            }
        }

        scene.add(currentModel);
        rotY = 0;
    }

    function updateView(type, el) {
        document.querySelectorAll('.char-option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        loadCharacter(type);
    }

    function animate() {
        requestAnimationFrame(animate);
        if(currentModel) {
            currentModel.rotation.y += (rotY - currentModel.rotation.y) * 0.1;
            currentModel.position.y = Math.sin(Date.now() * 0.002) * 0.1;
        }
        renderer.render(scene, camera);
    }

    // Anında başlatma kontrolü (Agresif)
    const check = setInterval(() => {
        if (window.THREE) {
            clearInterval(check);
            init();
        }
    }, 10);
</script>
</body>
</html>
