<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nisan için - Made by Talha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        
        :root {
            --toy-pink-light: #ffb3c6;
            --toy-pink-dark: #ff85a2;
            --toy-white: rgba(255, 255, 255, 0.9);
            --glass-soft: rgba(255, 255, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            background-color: #ffc2d1;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255, 255, 255, 0.05) 35px, rgba(255, 255, 255, 0.05) 70px);
            color: #4a1d2e;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            touch-action: none;
            transition: background-color 0.8s ease;
        }

        .bg-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            height: 100%;
            width: 100%;
        }

        .hidden-screen {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            z-index: 0;
        }

        .soft-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border: 3px solid #ffffff;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 768px) {
            .soft-panel { border-radius: 50px; border: 6px solid #ffffff; }
        }

        .pinned-note {
            position: absolute;
            top: 2%;
            right: 5%;
            width: 90px;
            height: 90px;
            background: #fff9c4;
            padding: 10px 5px;
            transform: rotate(5deg);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 120;
        }

        .pinned-note::before {
            content: '';
            position: absolute;
            top: -5px;
            width: 10px;
            height: 10px;
            background: #ff5252;
            border-radius: 50%;
        }

        .pinned-note p { font-weight: 800; color: #d84315; font-size: 10px; text-align: center; margin: 0; }
        #day-counter { font-size: 16px !important; }

        @media (min-width: 768px) {
            .pinned-note { width: 140px; height: 140px; top: 5%; }
            .pinned-note p { font-size: 14px; }
            #day-counter { font-size: 24px !important; }
        }

        .char-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            border-radius: 15px;
            transition: all 0.2s ease;
            padding: 8px;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .char-btn.selected {
            background: #ff85a2;
            color: white !important;
            border-color: #ffffff;
            transform: scale(1.02);
        }

        .room-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 0.5s ease-in-out;
        }

        .night-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(10, 10, 50, 0.4), rgba(5, 5, 30, 0.7));
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
            z-index: 25;
        }
        .night-active { opacity: 1; }

        .footer-credit {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 800;
            font-size: 0.75rem;
            color: #ff5c8d;
            z-index: 100;
        }

        .soft-btn {
            background: linear-gradient(135deg, #ff85a2, #ff5c8d);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: 800;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .speech-bubble {
            position: absolute;
            background: white;
            padding: 8px 12px;
            border-radius: 15px;
            color: #ff5c8d;
            font-weight: 800;
            font-size: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid #ffc2d1;
            bottom: 105%;
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            max-width: 160px;
            z-index: 110;
            display: none;
            text-align: center;
        }

        .draggable {
            cursor: grab;
            position: absolute;
            z-index: 100;
            touch-action: none;
        }

        .char-container {
            width: 140px;
            height: 140px;
            transition: filter 0.8s ease;
            position: relative;
        }

        @media (min-width: 768px) {
            .char-container { width: 250px; height: 250px; }
            .speech-bubble { font-size: 16px; max-width: 250px; border-radius: 25px; }
            .soft-btn { padding: 18px 50px; border-radius: 40px; border: 4px solid white; }
            .footer-credit { bottom: 20px; font-size: 1.1rem; }
        }

        /* Uzuv Sallanma */
        .limb { transform-box: fill-box; transition: transform 0.2s ease; }
        .is-dragging .limb-arm-l { animation: armSwingL 0.3s infinite alternate ease-in-out; transform-origin: top center; }
        .is-dragging .limb-arm-r { animation: armSwingR 0.3s infinite alternate ease-in-out; transform-origin: top center; }
        .is-dragging .limb-leg-l { animation: legSwingL 0.3s infinite alternate ease-in-out; transform-origin: top center; }
        .is-dragging .limb-leg-r { animation: legSwingR 0.3s infinite alternate ease-in-out; transform-origin: top center; }

        @keyframes armSwingL { from { transform: rotate(-25deg); } to { transform: rotate(25deg); } }
        @keyframes armSwingR { from { transform: rotate(25deg); } to { transform: rotate(-25deg); } }
        @keyframes legSwingL { from { transform: rotate(-15deg); } to { transform: rotate(15deg); } }
        @keyframes legSwingR { from { transform: rotate(15deg); } to { transform: rotate(-15deg); } }

        .item-icon {
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            background: white; border-radius: 50%;
            border: 2px solid #ffc2d1;
        }

        .sleeping-state {
            filter: brightness(0.25) grayscale(0.4) drop-shadow(0 0 10px rgba(0, 0, 0, 0.7)) !important;
            transform: scale(0.8) rotate(-15deg);
        }

        .dirty-effect { filter: sepia(0.5) contrast(0.8) brightness(0.7); }

        .hud-bar {
            background: white;
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid #ffc2d1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bed-target {
            position: absolute;
            right: 5%; bottom: 15%;
            width: 30%; height: 25%;
            pointer-events: none;
            z-index: 10;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            animation: rise 1s ease-out forwards;
        }
        @keyframes rise { to { transform: translateY(-100px) scale(2); opacity: 0; } }

        @keyframes bounce-anim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .bounce-char { animation: bounce-anim 2.5s ease-in-out infinite; }

        /* Mobil Scroll Fix */
        .no-scroll { overflow-y: hidden; max-height: 100%; }
        
        .secret-code-hint {
            position: absolute;
            top: 10px; left: 10px;
            color: black; font-weight: 800; font-size: 10px;
            z-index: 60; opacity: 0.5;
        }
    </style>
</head>

    const roomConfigs = {
        kitty: { kitchen: "https://img.freepik.com/free-vector/modern-kitchen-interior-background-template-cartoon-dinner-room-with-furniture_33099-131.jpg?semt=ais_hybrid&w=740&q=80", bathroom: "https://img.freepik.com/premium-vektor/modern-banyo-ic-mekani_118813-989.jpg", bedroom: "https://img.freepik.com/premium-vektor/cizgi-film-yatak-odasi-arka-plan-vektor-tasarimi_1206322-83.jpg?semt=ais_hybrid&w=740&q=80", garden: "https://img.freepik.com/premium-vektor/bos-arka-bahce-duz-renk-illustrasyonu-arka-planda-gunesli-gokyuzu-olan-insansiz-konut-binasi-avlusu-2d-cizgi-film-manzarasi-kirsal-kesim-gayrimenkul-banliyo-yasam-tarzi_151150-2631.jpg?w=360", school: "https://www.shutterstock.com/shutterstock/videos/1064288065/thumb/2.jpg?ip=x480" },
        stitch: { kitchen: "https://cdna.artstation.com/p/assets/images/images/041/568/770/large/kristin-smith-smith-kristin-y1-c2-a1-background.jpg?1632078565", bathroom: "https://img.freepik.com/premium-vektor/modern-banyo-ic-mekani_118813-989.jpg", bedroom: "https://mir-s3-cdn-cf.behance.net/project_modules/hd/e99c2736595091.5721d639647b0.jpg", garden: "https://static.vecteezy.com/system/resources/thumbnails/006/853/173/small/middle-of-a-forest-nature-illustration-vector.jpg", school: "https://www.shutterstock.com/shutterstock/videos/1064288065/thumb/2.jpg?ip=x480" },
        alien: { kitchen: "https://media.craiyon.com/2025-09-01/81gxPVV3Su6JnNIWQ7ihdA.webp", bathroom: "https://images-rsg.storage.googleapis.com/wp-content/uploads/2016/07/Space-Crisis-2D-Interior-Bathroom.jpg", bedroom: "https://img.freepik.com/premium-photo/scifi-bedroom-with-hovering-spaceship-serving-as-nightlight-providing-soft-light-music_124507-122551.jpg?w=360", garden: "https://www.awn.com/sites/default/files/styles/large_featured/public/image/featured/1030919-clip-regular-show-blasts-space-out-world-series-finale.jpg?itok=9KrqDtdN", school: "https://static.wikia.nocookie.net/theregularshow/images/6/60/S8E06.011_Space_Tree_and_Space_Bush.png/revision/latest?cb=20161013131802" }
    };

    const themes = { kitty: { bg: "#ffc2d1", heart: "#ff5c8d" }, stitch: { bg: "#0f172a", heart: "#000000" }, chick: { bg: "#2d1b33", heart: "#ffb3c6" }, alien: { bg: "#166534", heart: "#064e3b" } };

    let state = { selectedChar: 'kitty', room: 'kitchen', stats: { hunger: 80, hygiene: 100, energy: 70 }, isSleeping: false, atSchool: false, schoolTimeLeft: 0, lastCleaned: Date.now(), isDirty: false, letterUnlocked: false };

    function calculateDays() { return Math.floor((new Date() - new Date("2026-02-02")) / (1000 * 60 * 60 * 24)); }
    function changeScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen')); document.getElementById(id).classList.remove('hidden-screen'); }
    function closeModal() { document.getElementById('password-modal').classList.add('hidden'); }

    function updateSelection(char) {
        state.selectedChar = char;
        const theme = themes[char];
        document.body.style.backgroundColor = theme.bg;
        document.getElementById('heart-path').setAttribute('fill', theme.heart);
        document.querySelectorAll('#char-list button').forEach(b => b.classList.remove('selected'));
        document.getElementById('opt-' + char).classList.add('selected');
        document.getElementById('selection-preview').innerHTML = charData[char];
    }

    function openSecretLetter() {
        if(state.letterUnlocked) { showMessage("Nisan, seni çok seviyorum! ❤️"); }
        else { document.getElementById('password-modal').classList.remove('hidden'); document.getElementById('password-modal').classList.add('flex'); }
    }

    function checkLetterCode() {
        if(document.getElementById('secret-input').value === "nisan<3123") {
            state.letterUnlocked = true; document.getElementById('letter-icon').innerText = "💖 ✉️";
            showMessage("Açıldı!"); closeModal();
        } else showMessage("Yanlış!");
    }

    function enterWorld() {
        changeScreen('world-screen');
        document.getElementById('char-svg-wrap').innerHTML = charData[state.selectedChar];
        goRoom('kitchen');
        startLoop();
        makeElementDraggable(document.getElementById('char-draggable'), checkCollisions);
    }

    function startLoop() {
        setInterval(() => {
            if (Date.now() - state.lastCleaned > 600000) state.isDirty = true;
            if (!state.isSleeping && !state.atSchool) {
                state.stats.hunger = Math.max(0, state.stats.hunger - 0.05);
                state.stats.hygiene = Math.max(0, state.stats.hygiene - 0.03);
                state.stats.energy = Math.max(0, state.stats.energy - 0.02);
                updateUI();
            }
            if (state.atSchool) handleSchoolTimer();
            if(!state.isSleeping && !state.atSchool && Math.random() > 0.96) {
                if(state.selectedChar === 'chick') showSpeech(nisanQuotes);
                if(state.selectedChar === 'kitty') showSpeech(kittyQuotes);
            }
        }, 1000);
    }

    function showSpeech(quotes) {
        const b = document.getElementById('speech-bubble');
        b.innerText = quotes[Math.floor(Math.random() * quotes.length)];
        b.style.display = 'block'; setTimeout(() => b.style.display = 'none', 3500);
    }

    function updateUI() {
        document.getElementById('bar-hunger').style.width = state.stats.hunger + '%';
        document.getElementById('bar-hygiene').style.width = state.stats.hygiene + '%';
        document.getElementById('bar-energy').style.width = state.stats.energy + '%';
        const c = document.getElementById('char-container');
        const n = document.getElementById('night-vibe');
        if (state.isSleeping) { c.classList.add('sleeping-state'); n.classList.add('night-active'); }
        else { c.classList.remove('sleeping-state'); n.classList.remove('night-active'); if (state.isDirty || state.stats.hygiene < 30) c.classList.add('dirty-effect'); else c.classList.remove('dirty-effect'); }
    }

    function goRoom(room) {
        if (state.atSchool && room !== 'school') { showMessage("Dersim var!"); return; }
        state.room = room;
        const cfg = roomConfigs[state.selectedChar] || roomConfigs['kitty'];
        document.getElementById('room-bg-layer').style.backgroundImage = `url('${cfg[room] || roomConfigs['kitty'][room]}')`;
        const layer = document.getElementById('interaction-layer');
        const bed = document.getElementById('bed-target');
        const wrap = document.getElementById('char-draggable');
        const hint = document.getElementById('secret-hint');
        layer.innerHTML = ''; bed.classList.add('hidden'); hint.classList.add('hidden');
        if(room === 'garden' && state.selectedChar === 'stitch') hint.classList.remove('hidden');
        if(room === 'school') { wrap.style.left = "50%"; wrap.style.bottom = "25%"; wrap.style.top = "auto"; wrap.style.transform = "translateX(-50%)"; }
        if (room === 'kitchen') { layer.classList.remove('pointer-events-none'); layer.innerHTML = `<div id="food-item" class="draggable item-icon" style="right: 15%; bottom: 35%; top: auto;">${foods[currentFoodIdx]}</div>`; makeElementDraggable(document.getElementById('food-item'), checkCollisions); }
        if (room === 'bathroom') { layer.classList.remove('pointer-events-none'); layer.innerHTML = `<div id="soap-item" class="draggable item-icon" style="right: 15%; bottom: 35%; top: auto;">🧼</div>`; makeElementDraggable(document.getElementById('soap-item'), checkCollisions); }
        if (room === 'bedroom') bed.classList.remove('hidden');
        if (room === 'garden') { layer.classList.remove('pointer-events-none'); const t = (state.selectedChar === 'alien') ? 'EĞLEN!' : 'KOŞ! 🏃‍♂️'; layer.innerHTML = `<div class="absolute left-1/2 bottom-8 -translate-x-1/2"><button onclick="${state.selectedChar === 'alien' ? 'funWithRegularShow()' : 'runInGarden()'}" class="soft-btn text-xs md:text-lg">${t}</button></div>`; }
        if (room === 'school' && !state.atSchool) { layer.classList.remove('pointer-events-none'); layer.innerHTML = `<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 soft-panel p-6 text-center"><button onclick="startSchool()" class="soft-btn">GİR</button></div>`; }
        updateUI();
    }

    function makeElementDraggable(el, onDrag) {
        let p1, p2, p3, p4;
        el.onmousedown = el.ontouchstart = function(e) {
            if(state.atSchool && el.id === 'char-draggable') return;
            p3 = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            p4 = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            if (el.id === 'char-draggable') el.classList.add('is-dragging');
            document.onmouseup = document.ontouchend = function() {
                if (el.id === 'char-draggable') el.classList.remove('is-dragging');
                document.onmouseup = document.onmousemove = document.ontouchend = document.ontouchmove = null;
            };
            document.onmousemove = document.ontouchmove = function(e) {
                let cx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                let cy = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                p1 = p3 - cx; p2 = p4 - cy; p3 = cx; p4 = cy;
                el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px";
                if (onDrag) onDrag(el);
            };
        };
    }

    function checkCollisions(el) {
        const char = document.getElementById('char-draggable');
        const r1 = el.getBoundingClientRect(); const rC = char.getBoundingClientRect();
        const over = !(r1.right < rC.left || r1.left > rC.right || r1.bottom < rC.top || r1.top > rC.bottom);
        if (el.id === 'food-item' && over && state.stats.hunger < 100) {
            state.stats.hunger += 2.5; updateUI();
            if(state.stats.hunger > 99 || Math.random() > 0.95) { currentFoodIdx = (currentFoodIdx + 1) % foods.length; el.innerText = foods[currentFoodIdx]; el.style.right = "15%"; el.style.bottom = "35%"; el.style.top = "auto"; el.style.left = "auto"; showMessage("Yum!"); }
        }
        if (el.id === 'soap-item' && over) { state.stats.hygiene = Math.min(100, state.stats.hygiene + 2.5); state.isDirty = false; state.lastCleaned = Date.now(); updateUI(); createBubble(r1.left + 20, r1.top + 20); }
        if (el.id === 'char-draggable' && state.room === 'bedroom') {
            const b = document.getElementById('bed-target').getBoundingClientRect();
            const overB = !(rC.right < b.left || rC.left > b.right || rC.bottom < b.top || rC.top > b.bottom);
            if (overB && !state.isSleeping) { state.isSleeping = true; state.stats.energy = 100; updateUI(); showMessage("Zzz..."); }
            else if (!overB && state.isSleeping) { state.isSleeping = false; updateUI(); showMessage("Günaydın!"); }
        }
    }

    function runInGarden() {
        const c = document.getElementById('char-draggable'); c.style.transition = "all 0.4s";
        let cnt = 0; let itv = setInterval(() => { c.style.left = (20 + Math.random() * 60) + "%"; c.style.bottom = (50 + Math.random() * 50) + "px"; if(++cnt > 6) { clearInterval(itv); c.style.transition = "none"; state.stats.energy -= 20; state.isDirty = true; updateUI(); showMessage("Yoruldum!"); } }, 300);
    }

    function funWithRegularShow() {
        document.getElementById('main-area').classList.add('shaking'); showMessage("EĞLENCE! 🚀");
        setTimeout(() => { document.getElementById('main-area').classList.remove('shaking'); state.isDirty = true; updateUI(); }, 1500);
    }

    function createBubble(x, y) { const b = document.createElement('div'); b.className = 'bubble'; b.style.left = x + 'px'; b.style.top = y + 'px'; b.style.width = b.style.height = '20px'; document.body.appendChild(b); setTimeout(() => b.remove(), 1000); }
    function startSchool() { state.atSchool = true; state.schoolTimeLeft = 10; document.getElementById('school-info').classList.remove('hidden'); goRoom('school'); }
    function handleSchoolTimer() { if (state.schoolTimeLeft > 0) { state.schoolTimeLeft--; const m = Math.floor(state.schoolTimeLeft / 60), s = state.schoolTimeLeft % 60; document.getElementById('school-timer').innerText = `00:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; } else { state.atSchool = false; document.getElementById('school-info').classList.add('hidden'); updateUI(); goRoom('school'); showQuiz(); } }
    function showQuiz() { const q = [{ q: "En soğuk?", a: ["Asya", "Antarktika"], c: 1 }, { q: "Güneş?", a: ["Gezegen", "Yıldız"], c: 1 }][Math.floor(Math.random()*2)]; const o = document.getElementById('quiz-overlay'); document.getElementById('question-text').innerText = q.q; const g = document.getElementById('answers-grid'); g.innerHTML = ''; q.a.forEach((ans, i) => { const b = document.createElement('button'); b.className = "soft-btn text-sm"; b.innerText = ans; b.onclick = () => { if(i === q.c) { showMessage("Bravo!"); o.classList.add('hidden'); } else showMessage("Hata!"); }; g.appendChild(b); }); o.classList.remove('hidden'); o.classList.add('flex'); }
    function showMessage(txt) { const m = document.createElement('div'); m.className = "fixed top-20 left-1/2 -translate-x-1/2 bg-white text-[#ff5c8d] px-6 py-2 rounded-full font-black shadow-xl z-[300] animate-bounce border-2 border-[#ffc2d1] text-xs text-center"; m.innerText = txt; document.body.appendChild(m); setTimeout(() => m.remove(), 2500); }

    window.onload = () => { document.getElementById('day-counter').innerText = calculateDays(); updateSelection('kitty'); };
</script>
</body>
</html>
